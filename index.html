<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>GoA II Table Timer</title>
<meta name="theme-color" content="#081019">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon-192.png?v=2">
<link rel="apple-touch-icon" href="./icon-192.png?v=2">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;600;700&display=swap');
:root{
  --bg:#081019; --panel:#0F1E2B; --panel-soft:#122536; --line:#1C3448;
  --bronze:#C9A15A; --bronze-dim:#8A6F3C; --text:#EAE5D6; --dim:#8FA0AC;
  --blue:#48B4E8; --blue-deep:#153A52; --orange:#F0923E; --orange-deep:#4A2B12;
  --danger:#E05252; --ok:#5FBF7A;
  /* Silk motion (see STYLESEED.md) */
  --duration-fast:100ms; --duration-normal:200ms;
  --ease-default:cubic-bezier(0.4,0,0.2,1);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; min-height:100%;}
body{
  background:radial-gradient(1200px 600px at 50% -10%, #0E2233 0%, var(--bg) 60%) var(--bg);
  color:var(--text);
  font-family:'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
  display:flex; justify-content:center;
}
#app{width:100%; max-width:1000px; padding:18px clamp(14px,3vw,32px) 32px; display:flex; flex-direction:column; gap:16px;}
/* Big screens (tablet landscape, desktop): scale the whole UI up in steps so it
   fills the width instead of leaving large empty margins, and centre it
   vertically when there is spare height. Each zoom step only activates once the
   scaled 1000px column still fits the viewport. */
@media (min-width:1110px){
  body{min-height:100vh; align-items:safe center;}
}
/* Each zoom step also needs enough viewport HEIGHT for the tallest game screen
   (5v5 action, ~610px natural with .big compaction) so nothing ever scrolls
   mid-game. Short-but-wide viewports simply get a smaller step. */
@media (min-width:1110px) and (min-height:660px){ #app{zoom:1.1;} }
@media (min-width:1220px) and (min-height:740px){ #app{zoom:1.2;} }
@media (min-width:1330px) and (min-height:800px){ #app{zoom:1.3;} }
@media (min-width:1480px) and (min-height:890px){ #app{zoom:1.45;} }
@media (min-width:1640px) and (min-height:980px){ #app{zoom:1.6;} }
/* 4v4 and 5v5 rosters get slightly tighter tiles and stats so even the
   tallest screens fit the height gates above. */
#app.big .tile{min-height:56px; padding:9px 14px;}
#app.big .plist{gap:6px;}
#app.big table.stats th, #app.big table.stats td{padding:7px 10px;}
#app.big .pie-wrap svg{max-width:160px !important;} /* inline max-width needs the override */
/* The setup menu is the tallest screen, and tablets lose height to system
   bars: keep it compact and only zoom it when the viewport is tall enough. */
#app.menu{zoom:1; gap:12px; padding-top:12px;}
#app.menu h1{font-size:26px; margin:0;}
#app.menu .team-card{padding:10px; gap:6px;}
#app.menu input.name{padding:8px 10px;}
#app.menu .stepper{padding:8px 0;}
@media (min-width:1110px) and (min-height:800px){ #app.menu{zoom:1.1;} }
@media (min-width:1220px) and (min-height:880px){ #app.menu{zoom:1.2;} }
h1{font-family:'Cinzel',serif; font-size:30px; margin:4px 0 0; font-weight:700; text-align:center;}
.eyebrow{font-family:'Cinzel',serif; letter-spacing:3px; font-size:12px; color:var(--bronze); text-transform:uppercase; text-align:center;}
.hint{color:var(--dim); font-size:14px; text-align:center; line-height:1.5; margin:0;}
.row{display:flex; gap:10px; justify-content:center; align-items:center; flex-wrap:wrap;}
.btn{
  border:1px solid #2A455C; background:#12293C; color:var(--text);
  border-radius:12px; padding:12px 18px; font-size:15px; font-weight:600;
  cursor:pointer; touch-action:manipulation;
  transition:transform var(--duration-fast) var(--ease-default), background var(--duration-normal) var(--ease-default);
}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.35;}
.btn.primary{background:linear-gradient(180deg,var(--bronze),var(--bronze-dim)); color:#14100A; border-color:var(--bronze);}
.btn.big{padding:16px 22px; font-size:17px; width:100%;}
.btn.ghost{background:transparent;}
.btn.small{padding:8px 12px; font-size:13px; min-height:40px;}
.btn.tiny{padding:4px 8px; font-size:11.5px; border-radius:12px; min-width:40px; min-height:36px;}
button:focus-visible, input:focus-visible, .tile:focus-visible{outline:2px solid var(--bronze); outline-offset:2px;}
.btn.selected{background:linear-gradient(180deg,var(--bronze),var(--bronze-dim)); color:#14100A; border-color:var(--bronze);}
.topbar{display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap;}
.topbar .label{font-family:'Cinzel',serif; letter-spacing:1.5px; font-size:22px; font-weight:700; color:var(--bronze); text-transform:uppercase; display:inline-block;}
/* one-shot pulse when the turn/round advances, so the change is obvious at a glance */
@keyframes turnPop{0%{transform:scale(1.35); opacity:0; text-shadow:0 0 24px var(--bronze);} 55%{opacity:1;} 100%{transform:scale(1); opacity:1; text-shadow:none;}}
.topbar .label.turn-pop{animation:turnPop .7s var(--ease-default); transform-origin:left center;}
.teams-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.team-card{background:var(--panel); border:1px solid; border-radius:16px; padding:12px; display:flex; flex-direction:column; gap:8px;}
.team-col{border:2px solid; border-radius:16px; padding:12px; display:flex; flex-direction:column; gap:8px; background:var(--panel); transition:background var(--duration-normal) var(--ease-default), border-color var(--duration-normal) var(--ease-default);}
.team-tag{font-family:'Cinzel',serif; letter-spacing:2px; font-size:17px; font-weight:700; text-transform:uppercase; text-align:center;}
.bank{font-size:clamp(24px,6.2vw,38px); font-weight:700; text-align:center; font-variant-numeric:tabular-nums; line-height:1;}
.adj-note{font-size:11.5px; color:var(--dim); text-align:center; font-variant-numeric:tabular-nums; min-height:14px;}
input.name, input.code{background:var(--panel-soft); border:1px solid var(--line); border-radius:12px; color:var(--text); padding:10px 12px; font-size:15px; width:100%;}
input.code{text-align:center; font-size:18px; letter-spacing:4px; text-transform:uppercase;}
.stepper{display:flex; justify-content:space-between; align-items:center; padding:10px 0; gap:8px;}
.stepper .lbl{color:var(--text); font-size:15px; flex:1;}
.stepper .val{min-width:60px; text-align:center; font-variant-numeric:tabular-nums; font-size:16px; font-weight:600;}
.stepper .ctrls{display:flex; gap:8px; align-items:center;}
.settings{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:6px 14px;}
.tile{
  display:flex; flex-direction:column; align-items:flex-start; gap:2px; text-align:left;
  border:2px solid var(--panel-soft); background:#0C1A26; border-radius:12px;
  padding:12px 14px; min-height:64px; width:100%; color:var(--text);
  cursor:pointer; touch-action:manipulation;
  transition:box-shadow var(--duration-normal) var(--ease-default), border-color var(--duration-normal) var(--ease-default), background var(--duration-normal) var(--ease-default);
  font-family:inherit;
}
.tile:active{transform:scale(.985);}
.tile .nm{font-size:16px; font-weight:600;}
.tile .meta{font-size:12.5px; color:var(--dim); font-variant-numeric:tabular-nums;}
.tile .think{font-size:12px; font-weight:700; letter-spacing:1px;}
.plist{display:flex; flex-direction:column; gap:8px;}
.ring-wrap{display:flex; justify-content:center; padding:6px 0;}
.room-panel{background:var(--panel); border:1px solid var(--bronze); border-radius:16px; padding:12px 14px; display:flex; flex-direction:column; gap:8px; text-align:center;}
/* Devices / shared-session panel floats above the game as a dialog instead of
   pushing the layout down. Lives in #modal (outside #app) so tablet zoom
   never distorts it. */
.overlay{position:fixed; inset:0; background:rgba(3,8,14,.72); display:flex; align-items:center; justify-content:center; padding:24px; z-index:40;}
.overlay .room-panel{position:relative; width:100%; max-width:460px; max-height:calc(100vh - 48px); overflow:auto; padding:44px 16px 18px; box-shadow:0 18px 50px rgba(0,0,0,.55);}
.modal-x{position:absolute; top:6px; right:6px; background:transparent; border:none; color:var(--dim); font-size:17px; padding:8px 12px; cursor:pointer; font-family:inherit;}
.room-code{font-family:'Cinzel',serif; font-size:32px; letter-spacing:8px; color:var(--bronze); font-weight:700;}
.room-link{font-size:12px; color:var(--dim); word-break:break-all;}
.room-row{display:flex; justify-content:center; align-items:center; gap:18px; flex-wrap:wrap;}
.room-qr{display:flex;}
.room-qr svg{width:min(38vw,140px); height:auto; border-radius:12px;}
.bigtap{
  border:3px solid; border-radius:16px; padding:26px 16px; width:100%;
  background:#0C1A26; color:var(--text); font-family:inherit; cursor:pointer;
  display:flex; flex-direction:column; gap:10px; align-items:center; justify-content:center; touch-action:manipulation;
}
.bigtap .t1{font-size:clamp(22px,7vw,32px); font-weight:700;}
.bigtap .t3{font-size:14px; letter-spacing:1.5px; color:var(--dim); text-transform:uppercase;}
.bigtap .lbl{font-size:12px; letter-spacing:2px; color:var(--dim); text-transform:uppercase;}
.bigtap .bt-bank{font-size:clamp(26px,9vw,40px); font-weight:700; font-variant-numeric:tabular-nums; line-height:1;}
.bigtap .bt-turn{flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:10px;}
.bigtap .bt-turntime{font-size:clamp(56px,24vw,110px); font-weight:700; font-variant-numeric:tabular-nums; line-height:1;}
.bigtap .bt-prompt{font-size:clamp(18px,5.5vw,24px); letter-spacing:2px; color:var(--dim); text-transform:uppercase; line-height:1.6;}
.bigtap .bt-stats{font-size:18px; color:var(--text); font-variant-numeric:tabular-nums;}
.remote-foot{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.foot-box{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:12px 8px; text-align:center; display:flex; flex-direction:column; gap:4px;}
.foot-box .fb-label{font-size:12px; letter-spacing:1.5px; color:var(--dim); text-transform:uppercase;}
.foot-box .fb-val{font-size:clamp(20px,6.5vw,26px); font-weight:700; font-variant-numeric:tabular-nums;}
/* Phone remote: fill the whole phone screen. The content column stretches to
   full height and the tap button takes all free space, so the clock is huge
   and impossible to miss. Short screens (join, pick) centre vertically. */
#app.remote{min-height:100vh; min-height:100dvh; justify-content:center; zoom:1;}
.remote-fill{flex:1; display:flex; flex-direction:column; justify-content:center; gap:16px;}
.remote-fill .bigtap{flex:1;}
table.stats{width:100%; border-collapse:separate; border-spacing:0; background:var(--panel); border:1px solid var(--line); border-radius:16px; overflow:hidden;}
table.stats th{font-size:13px; letter-spacing:1px; text-transform:uppercase; color:var(--dim); font-weight:600; text-align:left; padding:10px 10px; border-bottom:1px solid var(--line);}
table.stats td{padding:10px 10px; font-size:16px; border-bottom:1px solid var(--panel-soft); font-variant-numeric:tabular-nums;}
table.stats tr:last-child td{border-bottom:none;}
table.stats td.num, table.stats th.num{text-align:center;}
.dot{display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:8px; vertical-align:baseline;}
.pie-wrap{display:flex; flex-direction:column; align-items:center; gap:6px;}
.legend{display:flex; flex-direction:column; gap:3px; font-size:12.5px; color:var(--dim); align-items:flex-start;}
.ic{width:1.15em; height:1.15em; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; vertical-align:-0.2em;}
@keyframes pulseDanger{0%,100%{opacity:1;}50%{opacity:.45;}}
.pulse-danger{animation:pulseDanger 1s ease-in-out infinite;}
@media (prefers-reduced-motion: reduce){.pulse-danger{animation:none;} .topbar .label{animation:none;} .btn,.tile{transition:none;}}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal"></div>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://unpkg.com/qrcode-generator@1.4.4/qrcode.js"></script>
<script>
"use strict";
/* ============ Guards of Atlantis II — Table Timer v3 ============
   Game = rounds · round = 4 turns · turn = strategy + actions.
   Round-end break timer, bank toggle, adjustment log, pie stats.
================================================================= */

const TEAMS = ["blue","orange"];
const LABEL = {blue:"Titans", orange:"Atlanteans"};
const PNAME = {blue:"Titan", orange:"Atlantean"};
const COLOR = {blue:"#48B4E8", orange:"#F0923E"};
const DEEP  = {blue:"#153A52", orange:"#4A2B12"};
/* inline line icons (stroke follows text color via .ic) */
const ICON = {
  phone: '<svg class="ic" viewBox="0 0 24 24"><rect x="7" y="2" width="10" height="20" rx="2.5"/><line x1="10.5" y1="18.5" x2="13.5" y2="18.5"/></svg>',
  bell: '<svg class="ic" viewBox="0 0 24 24"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>',
  bellOff: '<svg class="ic" viewBox="0 0 24 24"><path d="M13.7 21a2 2 0 0 1-3.4 0"/><path d="M18.6 13c-.4-1.4-.6-3-.6-5a6 6 0 0 0-9.3-5"/><path d="M6.3 6.3C6.1 6.8 6 7.4 6 8c0 7-3 9-3 9h14"/><line x1="2" y1="2" x2="22" y2="22"/></svg>',
  undo: '<svg class="ic" viewBox="0 0 24 24"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-15-6.7L3 13"/></svg>',
  x: '<svg class="ic" viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>',
  pause: '<svg class="ic" viewBox="0 0 24 24"><line x1="9" y1="5" x2="9" y2="19"/><line x1="15" y1="5" x2="15" y2="19"/></svg>',
};
const SHADES = {
  blue:   ["#7FCBF0","#48B4E8","#2E8FC4","#1E6A96","#144C6E"],
  orange: ["#F6B478","#F0923E","#D4772A","#A85D1F","#7C4416"],
};
const TURNS_PER_ROUND = 4;

let uidc = 0;
const uid = () => ++uidc;
function makeTeam(team, n){
  return Array.from({length:n}, (_,i)=>({id:uid(), name:PNAME[team]+" "+(i+1), time:0, turns:0, turnTime:0, lastKey:""}));
}

const S = {
  screen:"setup",                    // setup | strategy | action | roundbreak | stats
  strategySec:90, strategyOn:false,
  bankPerPlayerMin:10, bankOn:true,
  breakMin:2, breakOn:false,
  muted:false, paused:false,
  round:1, turn:1,
  players:{ blue:makeTeam("blue",2), orange:makeTeam("orange",2) },
  banks:{blue:0, orange:0},          // remaining when bankOn, time used when off
  adj:{blue:0, orange:0},            // net manual adjustments
  strategyLeft:90000, breakLeft:0, strategyUsed:0,
  active:null,
  gameStartAt:0, finishAt:0,
};
let beepedWarn=false, beepedZero=false, breakBeeped=false, bankAlarm={blue:false,orange:false};
const RING_R=118, CIRC=2*Math.PI*RING_R;

function fmt(ms){
  const neg = ms<0, t = Math.abs(ms);
  const m = Math.floor(t/60000), s = Math.floor((t%60000)/1000);
  return (neg?"\u2212":"") + m + ":" + String(s).padStart(2,"0");
}
function fmtSigned(ms){ return (ms>0?"+":"\u2212") + fmt(Math.abs(ms)).replace("\u2212",""); }
function fmtLong(ms){
  const m = Math.floor(ms/60000), s = Math.floor((ms%60000)/1000);
  return m>0 ? m+"m "+String(s).padStart(2,"0")+"s" : s+"s";
}
function fmtTotal(ms){
  const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000), s = Math.floor((ms%60000)/1000);
  return h>0 ? h+"h "+String(m).padStart(2,"0")+"m" : m+"m "+String(s).padStart(2,"0")+"s";
}
function esc(str){return String(str).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function teamOf(pid){ for(const t of TEAMS){ if(S.players[t].some(p=>p.id===pid)) return t; } return null; }

/* ---------- undo history ---------- */
let hist=[];
function snap(){
  hist.push(JSON.stringify({banks:S.banks, adj:S.adj, players:S.players, active:S.active,
    strategyLeft:S.strategyLeft, breakLeft:S.breakLeft, strategyUsed:S.strategyUsed,
    round:S.round, turn:S.turn, screen:S.screen}));
  if(hist.length>30) hist.shift();
}
function undo(){
  const h = hist.pop();
  if(!h) return;
  const d = JSON.parse(h);
  S.banks=d.banks; S.adj=d.adj; S.players=d.players; S.active=d.active;
  S.strategyLeft=d.strategyLeft; S.breakLeft=d.breakLeft; S.strategyUsed=d.strategyUsed;
  S.round=d.round; S.turn=d.turn; S.screen=d.screen;
  bankAlarm={blue:S.bankOn&&S.banks.blue<=0, orange:S.bankOn&&S.banks.orange<=0};
  beepedZero = S.strategyLeft<=0; beepedWarn = S.strategyLeft<=10000; breakBeeped = S.breakLeft<=0;
  render();
}

/* ---------- sound ---------- */
let actx=null;
function beep(freq=660,dur=0.14,when=0){
  if(S.muted) return;
  try{
    if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(), g=actx.createGain();
    o.frequency.value=freq; o.type="sine";
    g.gain.setValueAtTime(0.0001, actx.currentTime+when);
    g.gain.exponentialRampToValueAtTime(0.25, actx.currentTime+when+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+when+dur);
    o.connect(g).connect(actx.destination);
    o.start(actx.currentTime+when); o.stop(actx.currentTime+when+dur+0.05);
  }catch(e){}
}

/* ---------- wake lock ---------- */
let wakeLock=null;
async function requestWake(){
  try{ if("wakeLock" in navigator) wakeLock = await navigator.wakeLock.request("screen"); }catch(e){}
}
document.addEventListener("visibilitychange", ()=>{
  if(document.visibilityState==="visible" && S.screen!=="setup") requestWake();
});

/* =============================================================
   REMOTE PLAY (PeerJS)
============================================================= */
let mode = "local";
let peer=null, conns=[], roomCode=null, roomStatus="";
let claims={};
let showRoomPanel=false;
let conn=null, CS=null, csAt=0, myPid=null, clientScreen="join", joinErr="", joinCodePrefill="";

function randCode(n){
  const a="ABCDEFGHJKMNPQRSTUVWXYZ23456789"; let s="";
  for(let i=0;i<n;i++) s+=a[Math.floor(Math.random()*a.length)];
  return s;
}
function hostRoom(){
  if(!window.Peer){ roomStatus="Remote play needs internet"; render(); return; }
  if(peer) return;
  showRoomPanel = true;
  roomCode = randCode(4);
  roomStatus = "Opening session\u2026";
  peer = new Peer("goa2-room-"+roomCode);
  peer.on("open", ()=>{ mode="host"; roomStatus=""; render(); });
  peer.on("connection", c=>{
    conns.push(c);
    c.on("data", d=>handleMsg(c,d));
    c.on("open", ()=>c.send(stateMsg()));
    const drop = ()=>{
      conns = conns.filter(x=>x!==c);
      for(const k of Object.keys(claims)) if(claims[k]===c.peer) delete claims[k];
      broadcast(); render();
    };
    c.on("close", drop); c.on("error", drop);
  });
  peer.on("error", e=>{
    if(e.type==="unavailable-id"){ peer.destroy(); peer=null; hostRoom(); return; }
    roomStatus = "Session error: "+e.type; render();
  });
  render();
}
function closeRoom(){
  if(peer){ try{peer.destroy();}catch(e){} }
  peer=null; conns=[]; claims={}; roomCode=null; mode="local"; showRoomPanel=false; render();
}
function stateMsg(){
  return {t:"state", screen:S.screen, round:S.round, turn:S.turn, paused:S.paused, bankOn:S.bankOn,
    strategyLeft:S.strategyLeft, breakLeft:S.breakLeft, banks:S.banks, active:S.active,
    players:{
      blue:S.players.blue.map(p=>({id:p.id,name:p.name,time:p.time,turns:p.turns,turnTime:p.turnTime,claimed:!!claims[p.id]})),
      orange:S.players.orange.map(p=>({id:p.id,name:p.name,time:p.time,turns:p.turns,turnTime:p.turnTime,claimed:!!claims[p.id]})),
    }};
}
function broadcast(){
  if(mode!=="host") return;
  const m = stateMsg();
  conns.forEach(c=>{ try{ if(c.open) c.send(m); }catch(e){} });
}
function handleMsg(c,d){
  if(!d || typeof d!=="object") return;
  if(d.t==="claim"){
    const pid = Number(d.pid);
    // deny only if the claim's owner is still connected — a phone that dropped
    // (network loss, page reload) may hold a stale claim the host hasn't
    // noticed yet, and its player must be re-claimable on reconnect
    const ownerAlive = claims[pid] && claims[pid]!==c.peer && conns.some(x=>x.peer===claims[pid] && x.open);
    if(ownerAlive){ c.send({t:"claimDenied", pid}); return; }
    for(const k of Object.keys(claims)) if(claims[k]===c.peer) delete claims[k];
    claims[pid]=c.peer;
    c.send({t:"claimOk", pid});
    broadcast(); render();
  } else if(d.t==="tap"){
    const pid = Number(d.pid);
    if(claims[pid]!==c.peer) return;
    const team = teamOf(pid);
    if(team) tapPlayer(team, pid);
  } else if(d.t==="rename"){
    const pid = Number(d.pid);
    if(claims[pid]!==c.peer) return;
    const team = teamOf(pid); if(!team) return;
    const pl = S.players[team].find(p=>p.id===pid);
    const nm = String(d.name||"").trim().slice(0,14);
    if(pl && nm){ pl.name=nm; render(); }
  }
}
function joinRoom(code){
  code = code.trim().toUpperCase();
  if(!code){ joinErr="Enter the session code"; renderClient(); return; }
  if(!window.Peer){ joinErr="No internet connection"; renderClient(); return; }
  joinErr=""; clientScreen="connecting"; mode="client"; renderClient();
  if(peer){ try{peer.destroy();}catch(e){} }
  peer = new Peer();
  peer.on("open", ()=>{
    conn = peer.connect("goa2-room-"+code, {reliable:true});
    const fail = ()=>{ joinErr="Could not reach session "+code+". Check the code and try again."; clientScreen="join"; renderClient(); };
    const failTimer = setTimeout(fail, 8000);
    conn.on("open", ()=>{ clearTimeout(failTimer); clientScreen="pick"; renderClient(); });
    conn.on("data", d=>{
      if(d.t==="state"){ CS=d; csAt=performance.now(); if(clientScreen==="connecting") clientScreen="pick"; if(clientScreen!=="name") renderClient(); }
      else if(d.t==="claimOk"){ myPid=d.pid; clientScreen="name"; renderClient(); }
      else if(d.t==="claimDenied"){ joinErr="That player is taken by a connected device"; renderClient(); }
    });
    conn.on("close", ()=>{ joinErr="Connection lost \u2014 rejoin with the code"; clientScreen="join"; myPid=null; CS=null; renderClient(); });
    conn.on("error", ()=>{ clearTimeout(failTimer); fail(); });
  });
  peer.on("error", e=>{ joinErr="Connection failed ("+e.type+")"; clientScreen="join"; renderClient(); });
}

/* ---------- master tick ---------- */
let lastTick = performance.now();
let bcCount = 0;
setInterval(()=>{
  const now = performance.now();
  const dt = now - lastTick;
  lastTick = now;
  if(mode==="client"){ updateClientLive(); return; }
  if(!S.paused){
    if(S.screen==="strategy"){
      S.strategyLeft -= dt; S.strategyUsed += dt;
      updateStrategy();
    } else if(S.screen==="action" && S.active){
      const {team,id} = S.active;
      S.banks[team] += S.bankOn? -dt : dt;
      const pl = S.players[team].find(p=>p.id===id);
      if(pl){ pl.time += dt; pl.turnTime += dt; }
      updateAction();
    } else if(S.screen==="roundbreak"){
      S.breakLeft -= dt;
      updateBreak();
      if(S.breakLeft<=0 && !breakBeeped){
        breakBeeped=true;
        beep(440,0.18,0); beep(550,0.18,0.22); beep(660,0.25,0.44);
        startNextRound();
      }
    }
  }
  if(mode==="host" && ++bcCount>=5){ bcCount=0; broadcast(); }
},100);

function updateStrategy(){
  const el = document.getElementById("strat-time");
  if(!el) return;
  const over = S.strategyLeft<=0;
  el.textContent = fmt(S.strategyLeft);
  el.setAttribute("fill", over? "var(--danger)":"var(--text)");
  const lbl = document.getElementById("strat-label");
  lbl.textContent = over? "OVERTIME" : (S.paused? "PAUSED" : "PLAN TOGETHER");
  const ring = document.getElementById("strat-ring");
  const frac = Math.max(0, Math.min(1, S.strategyLeft/(S.strategySec*1000)));
  ring.setAttribute("stroke-dashoffset", CIRC*(1-frac));
  ring.setAttribute("stroke", over? "var(--danger)":"var(--bronze)");
  document.getElementById("ring-wrap").classList.toggle("pulse-danger", over);
  if(S.strategyLeft<=10000 && S.strategyLeft>0 && !beepedWarn){ beepedWarn=true; beep(520,0.1); }
  if(over && !beepedZero){ beepedZero=true; beep(440,0.18,0); beep(440,0.18,0.25); beep(330,0.3,0.5); }
}
function updateAction(){
  TEAMS.forEach(t=>{
    const b = document.getElementById("bank-"+t);
    if(!b) return;
    const empty = S.bankOn && S.banks[t]<=0;
    b.textContent = fmt(S.banks[t]);
    b.style.color = empty? "var(--danger)":"var(--text)";
    b.classList.toggle("pulse-danger", empty);
    if(empty && !bankAlarm[t]){ bankAlarm[t]=true; beep(300,0.4); }
    S.players[t].forEach(pl=>{
      const m = document.getElementById("pmeta-"+pl.id);
      if(m) m.textContent = fmt(pl.time);
      const r = document.getElementById("pround-"+pl.id);
      if(r) r.textContent = fmt(pl.turnTime);
    });
  });
}
function updateBreak(){
  const el = document.getElementById("break-time");
  if(!el) return;
  el.textContent = fmt(Math.max(0,S.breakLeft));
  const ring = document.getElementById("break-ring");
  const frac = Math.max(0, Math.min(1, S.breakLeft/(S.breakMin*60000)));
  ring.setAttribute("stroke-dashoffset", CIRC*(1-frac));
}

/* ---------- game flow ---------- */
function toStrategyOrAction(){
  S.strategyLeft = S.strategySec*1000;
  beepedWarn=false; beepedZero=false;
  S.active=null;
  TEAMS.forEach(t=>S.players[t].forEach(p=>{p.turnTime=0;}));
  S.screen = S.strategyOn? "strategy" : "action";
  render();
}
function startGame(){
  hist=[];
  TEAMS.forEach(t=>{ S.banks[t] = S.bankOn? S.bankPerPlayerMin*60000*S.players[t].length : 0; });
  S.adj={blue:0,orange:0};
  S.strategyUsed=0; S.round=1; S.turn=1; S.paused=false;
  S.gameStartAt=Date.now(); S.finishAt=0;
  TEAMS.forEach(t=>S.players[t].forEach(p=>{p.time=0; p.turns=0; p.turnTime=0; p.lastKey="";}));
  bankAlarm={blue:false,orange:false};
  toStrategyOrAction();
  requestWake();
}
function beginTurns(){ snap(); S.screen="action"; S.active=null; render(); }
function nextTurn(){
  snap();
  if(S.turn < TURNS_PER_ROUND){
    S.turn++;
    toStrategyOrAction();
  } else {
    S.active=null;
    if(S.breakOn){
      S.breakLeft = S.breakMin*60000;
      breakBeeped=false;
      S.screen="roundbreak"; render();
    } else {
      startNextRound();
    }
  }
}
function startNextRound(){
  S.round++; S.turn=1;
  toStrategyOrAction();
}
function skipBreak(){ snap(); startNextRound(); }
function allActedThisTurn(){
  const key = S.round+"-"+S.turn;
  return TEAMS.every(t=>S.players[t].every(p=>p.lastKey===key));
}
function tapPlayer(team,id){
  if(S.paused || S.screen!=="action") return;
  snap();
  if(S.active && S.active.team===team && S.active.id===id){
    S.active=null;
    if(allActedThisTurn()){ nextTurn(); return; }
    render(); return;
  }
  const pl = S.players[team].find(p=>p.id===id);
  if(pl){
    const key = S.round+"-"+S.turn;
    if(pl.lastKey!==key){ pl.turns++; pl.lastKey=key; }
  }
  S.active={team,id};
  beep(760,0.06);
  render();
}
function adjustBank(team, deltaMs){
  snap();
  S.banks[team] += deltaMs;
  S.adj[team] += deltaMs;
  if(S.bankOn && S.banks[team]>0) bankAlarm[team]=false;
  render();
}
function togglePause(){ S.paused=!S.paused; render(); }
function toggleMute(){ S.muted=!S.muted; render(); }
function finish(){ snap(); S.active=null; S.finishAt=Date.now(); S.screen="stats"; render(); }
function setSize(n){
  TEAMS.forEach(t=>{
    const cur = S.players[t];
    if(cur.length>n) S.players[t]=cur.slice(0,n);
    else while(S.players[t].length<n)
      S.players[t].push({id:uid(), name:PNAME[t]+" "+(S.players[t].length+1), time:0, turns:0, turnTime:0, lastKey:""});
  });
  render();
}

function pieSVG(values, colors){
  const total = values.reduce((a,b)=>a+b,0);
  const cx=80, cy=80, r=70;
  if(total<=0) return `<svg viewBox="0 0 160 160" style="width:100%;max-width:210px"><circle cx="80" cy="80" r="70" fill="var(--panel-soft)"/></svg>`;
  let a0=-Math.PI/2, out="";
  values.forEach((v,i)=>{
    if(v<=0) return;
    const frac=v/total;
    if(frac>=0.999){ out+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${colors[i%colors.length]}"/>`; return; }
    const a1=a0+frac*2*Math.PI;
    const x0=cx+r*Math.cos(a0), y0=cy+r*Math.sin(a0);
    const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
    const large = frac>0.5?1:0;
    out+=`<path d="M${cx},${cy} L${x0.toFixed(2)},${y0.toFixed(2)} A${r},${r} 0 ${large} 1 ${x1.toFixed(2)},${y1.toFixed(2)} Z" fill="${colors[i%colors.length]}" stroke="var(--bg)" stroke-width="2"/>`;
    a0=a1;
  });
  return `<svg viewBox="0 0 160 160" style="width:100%;max-width:210px">${out}</svg>`;
}

function renderStats(){
  const totalGame = (S.finishAt||Date.now()) - (S.gameStartAt||Date.now());
  const teamTotal = t => S.players[t].reduce((s,p)=>s+p.time,0);
  const table = t => `
    <table class="stats" style="border-color:${COLOR[t]}66">
      <thead><tr>
        <th style="color:${COLOR[t]}">Player</th><th class="num">Time</th><th class="num">Turns</th><th class="num">Avg</th>
      </tr></thead>
      <tbody>
        ${S.players[t].map((p,i)=>`
          <tr>
            <td><span class="dot" style="background:${SHADES[t][i%SHADES[t].length]}"></span>${esc(p.name)}</td>
            <td class="num">${fmtLong(p.time)}</td>
            <td class="num">${p.turns}</td>
            <td class="num">${p.turns>0? fmtLong(p.time/p.turns) : "\u2014"}</td>
          </tr>`).join("")}
      </tbody>
    </table>`;
  app.innerHTML = `
    <header>
      <div class="eyebrow">End Game Stats</div>
      <h1 style="font-size:28px">${S.round} ${S.round===1?"Round":"Rounds"} \u00B7 ${fmtTotal(totalGame)}</h1>
    </header>
    <div class="teams-grid">
      ${TEAMS.map(t=>`
        <div class="pie-wrap">
          <span class="team-tag" style="color:${COLOR[t]};font-size:21px">${LABEL[t]}</span>
          <div style="font-weight:700;font-size:19px;color:var(--text);font-variant-numeric:tabular-nums">${fmtLong(teamTotal(t))}</div>
          ${pieSVG(S.players[t].map(p=>p.time), SHADES[t])}
        </div>`).join("")}
    </div>
    <div class="teams-grid" style="align-items:start">
      ${TEAMS.map(t=>table(t)).join("")}
    </div>
    <div class="row">
      <button class="btn ghost" data-act="back">\u2190 Back to Game</button>
      <button class="btn primary" data-act="newgame">New Game</button>
    </div>`;
}

/* =============================================================
   RENDER — phone client
============================================================= */
function liveVal(base, running, up=false){
  if(!CS) return base;
  const d = performance.now()-csAt;
  return running && !CS.paused ? (up? base+d : base-d) : base;
}
function myTeam(){
  if(!CS || myPid==null) return null;
  for(const t of TEAMS) if(CS.players[t].some(p=>p.id===myPid)) return t;
  return null;
}
function renderClient(){
  app.classList.add("remote");
  app.classList.remove("menu");
  if(clientScreen==="join"){
    app.innerHTML = `
      <header>
        <div class="eyebrow">Guards of Atlantis II</div>
        <h1>Join a Game</h1>
      </header>
      <input class="code" id="join-code" maxlength="4" placeholder="CODE" value="${esc(joinCodePrefill)}" autocomplete="off">
      ${joinErr? `<p class="hint" style="color:var(--danger)">${esc(joinErr)}</p>`:""}
      <button class="btn primary big" data-act="join">Join</button>
      <p class="hint">Ask the main tablet for the 4-letter session code,<br>or open the shared link.</p>
      <div class="row"><button class="btn ghost small" data-act="be-host">I'm the main tablet</button></div>`;
    return;
  }
  if(clientScreen==="connecting"){
    app.innerHTML = `<header><h1>Connecting\u2026</h1></header><p class="hint">Reaching the session</p>`;
    return;
  }
  if(clientScreen==="pick"){
    if(!CS){ app.innerHTML = `<header><h1>Connected</h1></header><p class="hint">Waiting for the game\u2026</p>`; return; }
    app.innerHTML = `
      <header>
        <div class="eyebrow">Who are you?</div>
        <h1>Pick Your Hero</h1>
      </header>
      ${joinErr? `<p class="hint" style="color:var(--danger)">${esc(joinErr)}</p>`:""}
      ${TEAMS.map(t=>`
        <div class="team-card" style="border-color:${COLOR[t]}55">
          <div class="team-tag" style="color:${COLOR[t]}">${LABEL[t]}</div>
          ${CS.players[t].map(p=>`
            <button class="tile" data-claim="${p.id}"
              style="border-color:var(--panel-soft);opacity:${p.claimed?0.55:1}">
              <span class="nm">${esc(p.name)}</span>
              ${p.claimed?'<span class="meta">taken — tap to reconnect</span>':""}
            </button>`).join("")}
        </div>`).join("")}`;
    return;
  }
  if(clientScreen==="name"){
    const t = myTeam();
    const me = t? CS.players[t].find(p=>p.id===myPid) : null;
    if(!t || !me){ clientScreen="pick"; renderClient(); return; }
    app.innerHTML = `
      <header>
        <div class="eyebrow" style="color:${COLOR[t]}">${LABEL[t]}</div>
        <h1>What's Your Name?</h1>
      </header>
      <div class="remote-fill">
        <div class="row">
          <input class="name" id="rn-input" maxlength="14" value="${esc(me.name)}" style="max-width:260px;text-align:center;font-size:20px;padding:14px" autocomplete="off">
        </div>
        <button class="btn primary big" data-act="save-name">I'm Ready</button>
        <p class="hint">This is how you'll appear on the table timer<br>and in the end game stats.</p>
      </div>`;
    return;
  }
  // live
  if(!CS){ app.innerHTML = `<header><h1>Waiting\u2026</h1></header>`; return; }
  const t = myTeam();
  const me = t? CS.players[t].find(p=>p.id===myPid) : null;
  if(!t || !me){ clientScreen="pick"; renderClient(); return; }
  const opp = t==="blue"?"orange":"blue";
  const iAmActive = CS.active && CS.active.id===myPid;
  const teamRunning = tt => CS.screen==="action" && CS.active && CS.active.team===tt;
  const head = CS.screen==="strategy"? "Round "+CS.round+" \u00B7 Turn "+CS.turn+" \u00B7 Strategy"
             : CS.screen==="action"? "Round "+CS.round+" \u00B7 Turn "+CS.turn
             : CS.screen==="roundbreak"? "Round "+CS.round+" \u00B7 Break"
             : CS.screen==="stats"? "Game Over" : "Waiting for setup";
  let body="";
  if(CS.screen==="strategy"){
    const left = liveVal(CS.strategyLeft, true);
    body = `<div style="text-align:center">
      <div id="c-big" class="bank ${left<=0?"pulse-danger":""}" style="font-size:clamp(56px,22vw,110px);color:${left<=0?"var(--danger)":"var(--text)"}">${fmt(left)}</div>
      <p class="hint">${CS.paused?"PAUSED":"Plan together"}</p>
    </div>`;
  } else if(CS.screen==="roundbreak"){
    const left = liveVal(CS.breakLeft, true);
    body = `<div style="text-align:center">
      <div id="c-big" class="bank" style="font-size:clamp(56px,22vw,110px);color:var(--ok)">${fmt(Math.max(0,left))}</div>
      <p class="hint">${CS.paused?"PAUSED":"Break \u2014 next round starts soon"}</p>
    </div>`;
  } else if(CS.screen==="action"){
    const myBank = liveVal(CS.banks[t], teamRunning(t), !CS.bankOn);
    const oppBank = liveVal(CS.banks[opp], teamRunning(opp), !CS.bankOn);
    const activeName = CS.active? (CS.players[CS.active.team].find(p=>p.id===CS.active.id)||{}).name : null;
    const myTurn = liveVal(me.turnTime, iAmActive, true);
    body = `
      <button class="bigtap" data-mytap="1"
        style="border-color:${iAmActive?COLOR[t]:COLOR[t]+"55"};box-shadow:${iAmActive?"0 0 20px "+COLOR[t]+"66":"none"}">
        <span class="t1">${esc(me.name)}</span>
        <span class="lbl">team bank</span>
        <span class="bt-bank" id="c-mybank" style="color:${CS.bankOn&&myBank<=0?"var(--danger)":"var(--text)"}">${fmt(myBank)}</span>
        <span class="bt-turn">
          ${iAmActive? `
            <span class="bt-turntime" id="c-turn" style="color:${COLOR[t]}">${fmt(myTurn)}</span>
            <span class="t3" style="color:${COLOR[t]}">\u25CF active \u2014 tap to stop</span>`
          : `<span class="bt-prompt">tap to start<br>my clock</span>`}
        </span>
        <span class="bt-stats">${fmt(me.time)} \u00B7 ${me.turns}${me.turns===1?" turn":" turns"}</span>
      </button>
      <div class="remote-foot">
        <div class="foot-box">
          <div class="fb-label" style="color:${COLOR[opp]}">${LABEL[opp]} bank</div>
          <div class="fb-val" style="color:${COLOR[opp]}" id="c-oppbank">${fmt(oppBank)}</div>
        </div>
        <div class="foot-box">
          <div class="fb-label">now active</div>
          <div class="fb-val" id="c-running" style="color:${CS.paused?"var(--bronze)":(CS.active?COLOR[CS.active.team]:"var(--dim)")}">${CS.paused?ICON.pause+" Paused":(activeName? esc(activeName):"\u2014")}</div>
        </div>
      </div>`;
  } else if(CS.screen==="stats"){
    body = `<p class="hint">Final stats are on the main tablet \u2014<br>you used ${fmtLong(me.time)} over ${me.turns} ${me.turns===1?"turn":"turns"}.</p>`;
  } else {
    body = `<p class="hint">The main tablet is setting up the next game\u2026</p>`;
  }
  app.innerHTML = `
    <header>
      <div class="eyebrow" style="color:${COLOR[t]}">${LABEL[t]}</div>
      <h1 style="font-size:22px">${head}</h1>
    </header>
    <div class="remote-fill">${body}</div>`;
}
function updateClientLive(){
  if(clientScreen!=="live" || !CS) return;
  const t = myTeam(); if(!t) return;
  if(CS.screen==="strategy" || CS.screen==="roundbreak"){
    const el=document.getElementById("c-big");
    if(el){
      const base = CS.screen==="strategy"? CS.strategyLeft : CS.breakLeft;
      const v = liveVal(base, true);
      el.textContent = fmt(CS.screen==="roundbreak"? Math.max(0,v) : v);
      if(CS.screen==="strategy") el.style.color = v<=0? "var(--danger)":"var(--text)";
    }
  } else if(CS.screen==="action"){
    const opp = t==="blue"?"orange":"blue";
    const run = tt => CS.active && CS.active.team===tt;
    const b=document.getElementById("c-mybank");
    if(b){ const v=liveVal(CS.banks[t],run(t),!CS.bankOn); b.textContent=fmt(v); b.style.color = CS.bankOn&&v<=0? "var(--danger)":"var(--text)"; }
    const me = CS.players[t].find(p=>p.id===myPid);
    const tu=document.getElementById("c-turn");
    if(tu && me){ tu.textContent = fmt(liveVal(me.turnTime, CS.active && CS.active.id===myPid, true)); }
    const o=document.getElementById("c-oppbank");
    if(o){ o.textContent = fmt(liveVal(CS.banks[opp],run(opp),!CS.bankOn)); }
  }
}

/* ---------- event delegation ---------- */
const onTap = e=>{
  const mytap = e.target.closest("[data-mytap]");
  if(mytap){ if(conn && conn.open && myPid!=null) conn.send({t:"tap", pid:myPid}); return; }
  const claim = e.target.closest("[data-claim]");
  if(claim){ if(conn && conn.open) conn.send({t:"claim", pid:Number(claim.dataset.claim)}); return; }
  const tap = e.target.closest("[data-tap]");
  if(tap){ tapPlayer(tap.dataset.team, Number(tap.dataset.tap)); return; }
  const adj = e.target.closest("[data-adj]");
  if(adj){ adjustBank(adj.dataset.team, Number(adj.dataset.adj)*1000); return; }
  const btn = e.target.closest("[data-act]");
  if(!btn) return;
  switch(btn.dataset.act){
    case "start": startGame(); break;
    case "begin": beginTurns(); break;
    case "next": nextTurn(); break;
    case "skip-break": skipBreak(); break;
    case "pause": togglePause(); break;
    case "mute": toggleMute(); break;
    case "finish": finish(); break;
    case "undo": undo(); break;
    case "back": S.screen="action"; S.finishAt=0; render(); break;
    case "newgame": S.screen="setup"; render(); break;
    case "size": setSize(Number(btn.dataset.n)); break;
    case "strat-dec": S.strategySec=Math.max(30,S.strategySec-15); render(); break;
    case "strat-inc": S.strategySec=Math.min(300,S.strategySec+15); render(); break;
    case "bank-dec": S.bankPerPlayerMin=Math.max(1,S.bankPerPlayerMin-1); render(); break;
    case "bank-inc": S.bankPerPlayerMin=Math.min(30,S.bankPerPlayerMin+1); render(); break;
    case "break-dec": S.breakMin=Math.max(1,S.breakMin-1); render(); break;
    case "break-inc": S.breakMin=Math.min(10,S.breakMin+1); render(); break;
    case "strat-toggle": S.strategyOn=!S.strategyOn; render(); break;
    case "break-toggle": S.breakOn=!S.breakOn; render(); break;
    case "setup-join": joinRoom(document.getElementById("setup-join-code").value); break;
    case "save-name": {
      const inp = document.getElementById("rn-input");
      const v = inp? inp.value.trim() : "";
      if(v && conn && conn.open && myPid!=null) conn.send({t:"rename", pid:myPid, name:v});
      clientScreen="live"; renderClient(); break;
    }
    case "room": showRoomPanel=!showRoomPanel; render(); break;
    case "close-panel":
      // only the backdrop itself or the ✕ button closes — not clicks inside the panel
      if(btn.classList.contains("overlay") && e.target!==btn) break;
      showRoomPanel=false; render(); break;
    case "host-room": hostRoom(); break;
    case "close-room": closeRoom(); break;
    case "copy-link":
      try{ navigator.clipboard.writeText(location.origin+location.pathname+"?join="+roomCode); }catch(err){}
      break;
    case "join": joinRoom(document.getElementById("join-code").value); break;
    case "be-host": mode="local"; clientScreen="join"; history.replaceState(null,"",location.pathname); render(); break;
  }
};
app.addEventListener("click", onTap);
modal.addEventListener("click", onTap);
app.addEventListener("input", e=>{
  const inp = e.target.closest("[data-name]");
  if(!inp) return;
  const pl = S.players[inp.dataset.team].find(p=>p.id===Number(inp.dataset.name));
  if(pl) pl.name = inp.value;
});

/* ---------- offline support ---------- */
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));
}

/* ---------- entry ---------- */
const joinParam = new URLSearchParams(location.search).get("join");
if(joinParam){
  mode="client"; clientScreen="join"; joinCodePrefill=joinParam.toUpperCase();
  renderClient();
  joinRoom(joinParam);
} else {
  render();
}
</script>
</body>
</html>
